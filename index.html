<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editoz Flag Trends</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
:root{--ink:#14161a;--muted:#6b7280;--bg:#f4f5f7;--card:#ffffff;--border:#e8e9ec;--shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);}
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;margin:0;color:var(--ink);-webkit-font-smoothing:antialiased;background:radial-gradient(900px 360px at 50% -8%,rgba(79,70,229,.09),transparent 60%),radial-gradient(700px 320px at 100% 0%,rgba(219,39,119,.06),transparent 55%),linear-gradient(180deg,#f8f9fb 0%,#eef0f4 100%);background-attachment:fixed;min-height:100vh;}
.topbar{background:rgba(255,255,255,.75);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;}
.logo-pill{display:inline-flex;align-items:center;gap:9px;background:#131417;border-radius:999px;padding:6px 16px 6px 6px;box-shadow:0 1px 2px rgba(16,24,40,.14),0 1px 1px rgba(0,0,0,.2);}
.logo-icon{width:26px;height:26px;border-radius:50%;background:#232429;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);}
.logo-icon svg{width:10px;height:10px;margin-left:1px;}
.logo-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.01em;}
.logo-text span{color:#9aa3c9;font-weight:500;}
.page{max-width:980px;margin:0 auto;padding:40px 24px 64px;}
.page-header{margin-bottom:28px;}
.page-header h1{font-size:26px;font-weight:700;margin:0 0 6px;letter-spacing:-0.02em;}
.page-header p{margin:0;color:var(--muted);font-size:14.5px;}
#status{color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;padding:12px 16px;border-radius:10px;font-size:13.5px;margin-bottom:20px;display:none;}
#status.visible{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:20px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 24px 12px;box-shadow:var(--shadow);}
.chart-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.chart-card-head h2{font-size:14.5px;font-weight:600;margin:0;display:flex;align-items:center;gap:8px;}
.badge{font-size:11px;font-weight:600;color:var(--muted);background:#f2f3f5;padding:4px 9px;border-radius:999px;letter-spacing:.01em;}
.chart-wrap{position:relative;height:260px;}
footer{text-align:center;color:#9ca3af;font-size:12px;margin-top:36px;}
@media (max-width:480px){.topbar{padding:16px 20px;}.page{padding:28px 16px 48px;}}
</style>
</head>
<body>
<div class="topbar">
<div class="logo-pill">
<div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 5.5L18 12L8 18.5V5.5Z" fill="white"/></svg></div>
<div class="logo-text">editoz<span>.club</span></div>
</div>
</div>
<div class="page">
<div class="page-header">
<h1>Flag Trends</h1>
<p>Execution &amp; Creative flags across the last 3 audit weeks</p>
</div>
<div id="status"></div>
<div class="grid">
<div class="chart-card">
<div class="chart-card-head"><h2>⚙️ Execution Flags</h2><span class="badge">3-week trend</span></div>
<div class="chart-wrap"><canvas id="executionChart"></canvas></div>
</div>
<div class="chart-card">
<div class="chart-card-head"><h2>🎨 Creative Flags</h2><span class="badge">3-week trend</span></div>
<div class="chart-wrap"><canvas id="creativeChart"></canvas></div>
</div>
</div>
<footer>Weekly Audit Records &middot; synced from Notion</footer>
</div>
<script>
function ordinal(n){var s=["th","st","nd","rd"];var v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function formatWeekRange(isoDate){var start=new Date(isoDate+"T00:00:00");var end=new Date(start);end.setDate(start.getDate()+6);function fmt(d){return d.toLocaleString("en-US",{month:"long"})+" "+ordinal(d.getDate());}return fmt(start)+" - "+fmt(end);}
function makeGradient(ctx,chartArea,colorTop,colorBottom){var gradient=ctx.createLinearGradient(0,chartArea.top,0,chartArea.bottom);gradient.addColorStop(0,colorTop);gradient.addColorStop(1,colorBottom);return gradient;}
async function loadData(){
var statusEl=document.getElementById("status");
try{
var res=await fetch("/api/audit");
var data=await res.json();
if(!res.ok){
statusEl.classList.add("visible");
statusEl.textContent="Error loading data: "+(data.error||res.status)+(data.notion_error&&data.notion_error.message?" - "+data.notion_error.message:"");
console.error("API error:",data);
return;
}
var labels=data.weeks.map(formatWeekRange);
renderChart("executionChart",labels,data.executionFlags,"#4f46e5","#7c7ff2");
renderChart("creativeChart",labels,data.creativeFlags,"#db2777","#f0479f");
}catch(err){
statusEl.classList.add("visible");
statusEl.textContent="Something went wrong rendering the dashboard: "+err.message;
console.error(err);
}
}
function renderChart(canvasId,labels,values,colorTop,colorBottom){
var ctx=document.getElementById(canvasId).getContext("2d");
new Chart(ctx,{
type:"bar",
data:{labels:labels,datasets:[{label:"Flags",data:values,backgroundColor:function(context){var chart=context.chart;var ctx2=chart.ctx;var chartArea=chart.chartArea;if(!chartArea)return colorTop;return makeGradient(ctx2,chartArea,colorTop,colorBottom);},borderRadius:8,maxBarThickness:72}]},
options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#14161a",padding:10,cornerRadius:8,displayColors:false}},scales:{y:{beginAtZero:true,ticks:{precision:0,color:"#9ca3af",font:{size:12}},grid:{color:"#eef0f2"}},x:{ticks:{color:"#4b5563",font:{size:12,weight:"600"}},grid:{display:false}}}}
});
}
loadData();
</script>
</body>
</html>
