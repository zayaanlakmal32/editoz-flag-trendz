<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Editoz Flag Trends</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    color: #1a1a1a;
    background: #fafafa;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.subtitle { color: #666; margin-top: 0; font-size: 14px; }
  .chart-card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .chart-card h2 { font-size: 15px; margin: 0 0 12px; }
  #status { color: #b91c1c; font-size: 14px; }
</style>
</head>
<body>
  <h1>Editoz Flag Trends</h1>
  <p class="subtitle">Last 3 audit weeks — Execution &amp; Creative flags</p>
  <div id="status"></div>

  <div class="chart-card">
    <h2>⚙️ Execution Flags</h2>
    <canvas id="executionChart" height="120"></canvas>
  </div>

  <div class="chart-card">
    <h2>🎨 Creative Flags</h2>
    <canvas id="creativeChart" height="120"></canvas>
  </div>

<script>
async function loadData() {
  const statusEl = document.getElementById("status");
  try {
    const res = await fetch("/api/audit");
    const data = await res.json();

    if (!res.ok) {
      statusEl.textContent = `Error loading data: ${data.error || res.status}` +
        (data.notion_error?.message ? ` — ${data.notion_error.message}` : "");
      console.error("API error:", data);
      return;
    }

    renderChart("executionChart", data.weeks, data.executionFlags, "#2563eb");
    renderChart("creativeChart", data.weeks, data.creativeFlags, "#db2777");
  } catch (err) {
    statusEl.textContent = "Failed to reach /api/audit: " + err.message;
    console.error(err);
  }
}

function renderChart(canvasId, labels, values, color) {
  new Chart(document.getElementById(canvasId), {
    type: "bar",
    data: {
      labels,
      datasets: [{ label: "Flags", data: values, backgroundColor: color, borderRadius: 4 }],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
    },
  });
}

loadData();
</script>
</body>
</html>
